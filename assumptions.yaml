# 영농형 태양광 경제성 계산기 — 기본 가정값
# 2026.05.14 기준 (v1.1) — 2026 리서치 데이터 적용
# 기준: 전남 / 논벼 / 99kW / 2,000㎡
#
# 출처:
# - 한국전력거래소 EPSIS (SMP·REC 월별 동향)
# - 한국에너지공단 신재생에너지센터 (REC 가중치, 금융지원사업)
# - 통계청 2024년산 논벼 생산비조사
# - 영암군 영농형 실증 결과 (단수 감소 21%)
# - 재생에너지법 개정안 (2026.02.12 국회 통과, 일시사용 8년→23년)

meta:
  version: "2026-v1.1"
  data_date: "2026-05-14"
  base_region: "jeonnam"
  base_crop: "rice"
  source_note: "KREI(2023) 「영농형 태양광 도입의 경제성 분석」 4장 모델 + 2026 리서치 데이터"
  updated: "2026-05-14 — PDF 2023값을 2026 리서치 값으로 교체 (v1.0 → v1.1)"

# 시설 기본 사양 ────────────────────────────────────────────
facility:
  area_m2: 2000                # ㎡
  capacity_kw: 99              # kW
  daily_gen_hours: 3.7         # h/일 (전남 평균, 2026 추정 — 모듈 효율 향상 반영)
  # PDF(2023) 참고값: 3.5h/일
  efficiency_decline: 0.011    # 연 발전효율 감소율 1.1% (변동 없음)
  lifetime_years: 23           # 농지법 개정 반영 (2026.02 통과: 8년→23년)

# 사업비 (천원 단위, 2026 추정) ──────────────────────────
# 주의: 모든 금액은 천원 단위. 210,000 = 2.1억원
cost:
  total: 210_000           # 2.1억 (2026 업계 견적 평균, PDF 1.96억 → +7%)
  construction: 194_000    # 공사비 — kW당 약 196만원 (모듈·인버터·구조물·설계감리·시공)
  permits: 16_000          # 농지보전·계통연계·개발행위 (변동 없음)
  # PDF(2023) 참고값: 총 196,000 (공사비 180,000 / permits 16,000)

# 자금 조달 ─────────────────────────────────────────────
finance:
  equity_ratio: 0.235          # 자기자본 비율 23.5% (PDF 기준 유지)
  loan_rate: 0.018             # 2026 신재생에너지 금융지원 (분기 변동, 약 1.5~2.0%)
  # PDF(2023) 참고값: 2.8%
  grace_years: 5               # 거치 5년 (PDF와 동일)
  repay_years: 10              # 분할상환 10년 (PDF와 동일)
  loan_options:                # UI 토글용
    policy_2023:  { name: "정책금리(2023 PDF 비교용)", rate: 0.028 }
    policy_2026:  { name: "신재생에너지 금융지원(2026)", rate: 0.018 }
    rural_fund:   { name: "농어촌진흥기금(2026)",      rate: 0.010 }
    market:       { name: "시중금리(2026)",            rate: 0.045 }

# 발전 가격 (두 트랙) ───────────────────────────────────
power_price:
  # 트랙 A: 기존 RPS (2026 이전 준공 사업)
  # 2026년부터 신규 사업은 REC 미발급 → PPA 트랙 권장
  rps_track:
    smp_krw_per_kwh: 109.6           # 2026.1~4 평균 (해줌, KPX EPSIS)
    rec_krw_per_kwh: 71.3            # 2026.1~4 평균 (가중치 적용 전)
    weight: 1.2                       # 영농형 가중치 (1.0 + 0.2 보너스, 변동 없음)
    # PDF(2023 H1) 참고값: SMP 106.32, REC 47.17 → 합계 162.92원
    # 2026 합계: 109.6 + 71.3 × 1.2 = 195.16원/kWh (+20%)

  # 트랙 B: 신규 PPA / 고정가격계약 (2026 이후 신규 사업)
  ppa_track:
    fixed_price_krw_per_kwh: 154.7    # 2025 상반기 평균낙찰가 (한국에너지공단)
    # 범위: 140 ~ 170 원/kWh

  # 시나리오 분석용 (PDF 표 4-6)
  scenarios:
    base:       162.9       # PDF baseline (비교 유지)
    decline:    152.4
    sharp_decline: 141.9

# 운영비 (천원/년, 99kW 기준) ─────────────────────────────
opex_thousand_krw:
  inverter_replace: 1000       # 인버터 교체 (10년 주기 분할; 일시 1,000만원 × 2회)
  electrical_mgmt:  1200       # 전기안전관리대행 (KESCO 2025 수수료표 기준)
  insurance:         540       # 보험료 (사업비 0.3% 기준; 2.1억 → 약 63만원/년이 정확하나 PDF 유지)
  waste_disposal:    250       # 폐기물 처리 (모듈 회수·재활용 비용 반영)
  utility_repair:    420       # 전기료 및 수선비

# 작물 (벼 기본, 확장 가능) ──────────────────────────────
crops:
  rice:
    name_kr: "논벼"
    base_income_thousand_krw_per_2000m2: 1388   # 2018~2022 올림픽평균 (PDF)
    # 2020~2024 올림픽평균은 추후 KOSIS 직접 확인 권장
    # (2024 -24% 급감으로 새 평균은 더 낮을 가능성)
    yield_reduction: 0.20                        # 영농형 하부 단수 20% 감소
    # 영암군 실증 결과 21% (PDF 가정과 일치)
    note: "2024 단수 급감 미반영. 보수적으로는 ~1,250 천원 권장"
  # 향후 확장 (현재 비활성):
  # potato:  { name_kr: "감자", yield_reduction: 0.18 }
  # onion:   { name_kr: "양파", yield_reduction: 0.11 }
  # cabbage: { name_kr: "배추", yield_reduction: 0.07 }

# 지역 (전남 기본, 확장 가능) ────────────────────────────
regions:
  jeonnam:
    name_kr: "전라남도"
    avg_sun_hours: 3.7                  # 2026 추정 (해남·영광 서남부 더 높음)
    land_price_outside_per_m2: 16200    # 진흥지역 밖 평균 (2025 추정, 2022 PDF × 누적 상승률)
    land_price_inside_per_m2: 18500     # 진흥지역 안 (추정)
    conversion_tax_rate: 0.30           # 잡종지 전환 시 공시지가 30%
    # PDF(2022) 참고값: 진흥지역 밖 15,415원/㎡

# 농지법 (2026 개정 — 단일 시나리오) ─────────────────────
land_law:
  current:
    max_operation_years: 23
    requires_land_conversion: false
    name_kr: "현행(2026.02 개정) 23년 일시사용허가"
  # 비교용 (전문가 모드에서만 노출):
  legacy_8yr:
    max_operation_years: 8
    requires_land_conversion: false
    name_kr: "구법 8년만 운영"
  legacy_conversion:
    max_operation_years: 20
    requires_land_conversion: true
    name_kr: "구법 + 잡종지 전환 후 20년"

# 할인율 (NPV 계산) ─────────────────────────────────────
discount:
  base_rate: 0.018              # 2026 정책 융자 금리와 동일 가정 (PDF는 2.8%)
  risk_premium:
    none:   { management: 0.00, financial: 0.00, total: 0.045 }
    low:    { management: 0.03, financial: 0.02, total: 0.095 }
    mid:    { management: 0.06, financial: 0.04, total: 0.145 }
    high:   { management: 0.09, financial: 0.06, total: 0.195 }
  market_loan_rate: 0.045       # 시중금리 (리스크 프리미엄 분석용)
  market_repay_years: 20

# 시나리오 분석 변수 ──────────────────────────────────
sensitivity:
  price_change:    [-0.15, 0, 0.15]   # 발전가격 ±15%
  cost_change:     [-0.15, 0, 0.15]   # 설치비 ±15%
  rate_change:     [-0.0105, 0]       # 금리 인하 1.05%p
